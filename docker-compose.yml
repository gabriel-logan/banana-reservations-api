services:
  reservations-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://banana:banana@reservations-db:5432/banana_reservations}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
    depends_on:
      reservations-db:
        condition: service_healthy

  reservations-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: banana
      POSTGRES_PASSWORD: banana
      POSTGRES_DB: banana_reservations
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banana -d banana_reservations"]
      interval: 5s
      timeout: 5s
      retries: 5
